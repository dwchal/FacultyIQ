# FacultyIQ Configuration File
# Copy to config.yml and modify as needed
# API keys should be set via environment variables, not in this file

default:
  # App settings
  app_title: "FacultyIQ - Academic Research Analytics"
  cache_dir: "cache"
  cache_expiry_days: 7

  # OpenAlex settings (free, no key required)
  openalex:
    enabled: true
    # Email for polite pool (faster rate limits) - set via OPENALEX_EMAIL env var
    mailto: !expr Sys.getenv("OPENALEX_EMAIL", "")
    rate_limit_per_second: 10
    batch_size: 25

  # Scopus settings (requires API key)
  scopus:
    enabled: true
    # API key - set via SCOPUS_API_KEY env var
    api_key: !expr Sys.getenv("SCOPUS_API_KEY", "")
    rate_limit_per_second: 3

  # Google Scholar settings (scraping, fragile)
  scholar:
    enabled: true
    rate_limit_per_second: 0.5
    # Aggressive caching due to rate limits
    cache_expiry_days: 30

  # Bibliometrix settings
  bibliometrix:
    enabled: true

  # ORCID settings (free, no API key required)
  orcid:
    enabled: true
    base_url: "https://pub.orcid.org/v3.0"
    rate_limit_per_second: 24

  # NIH Reporter settings (free, no API key required)
  nih_reporter:
    enabled: true
    base_url: "https://api.reporter.nih.gov/v2"
    rate_limit_per_second: 7
    default_from_year: 2000

  # NSF Award Search settings (free, no API key required)
  nsf_awards:
    enabled: true
    base_url: "https://www.research.gov/awardapi-service/v1/awards.json"
    rate_limit_per_second: 5
    default_from_year: 2000

  # CrossRef settings (free, polite pool with email)
  crossref:
    enabled: true
    base_url: "https://api.crossref.org"
    mailto: !expr Sys.getenv("CROSSREF_EMAIL", "")
    rate_limit_per_second: 50
    enrich_top_works: 50

  # Semantic Scholar settings (free, no API key required for basic use)
  semantic_scholar:
    enabled: true
    base_url: "https://api.semanticscholar.org/graph/v1"
    rate_limit_per_second: 1
    cache_expiry_days: 14

  # Data settings
  data:
    # Maximum roster size (for performance)
    max_roster_size: 500
    # Default time window for "recent" metrics
    recent_years: 5
    # Minimum year for analysis
    min_year: 1990

# Production overrides (if needed)
production:
  cache_expiry_days: 14
